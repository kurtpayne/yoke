app = "yoke-probe"
primary_region = "sjc"

[build]

[processes]
  app = "/probe-proxy"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Health check — Fly verifies new machines are healthy before routing traffic
  [[http_service.checks]]
    interval = "5s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[deploy]
  strategy = "bluegreen"

[[vm]]
  size = "shared-cpu-1x"
  memory = 256
