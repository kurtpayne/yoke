name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict permissions — CI only needs to read source, nothing else
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install client dependencies
        working-directory: client
        run: bun install --frozen-lockfile

      - name: Install worker dependencies
        working-directory: worker
        run: bun install --frozen-lockfile

      - name: Audit dependencies for known vulnerabilities
        working-directory: client
        run: bun pm ls --all 2>/dev/null | head -50
        continue-on-error: true

      - name: Check for suspicious install scripts in dependencies
        working-directory: client
        run: |
          echo "Checking for preinstall/postinstall scripts in dependencies..."
          SUSPICIOUS=$(find node_modules -maxdepth 3 -name "package.json" -exec grep -l '"preinstall"\|"postinstall"' {} \; 2>/dev/null || true)
          if [ -n "$SUSPICIOUS" ]; then
            echo "::warning::Found packages with install scripts:"
            echo "$SUSPICIOUS"
          else
            echo "✓ No suspicious install scripts found"
          fi

      - name: Type check (worker)
        working-directory: worker
        run: bun run typecheck

      - name: Type check (client — non-blocking)
        working-directory: client
        run: bun run typecheck || echo "::warning::Client type check has known issues (see tech debt)"
        continue-on-error: true

      - name: Run tests
        run: bun run test
