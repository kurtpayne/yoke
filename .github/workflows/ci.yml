name: CI + Deploy (Worker)

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'client/**'
      - 'tests/**'
      - 'package.json'
      - 'vitest.config.ts'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'worker/**'
      - 'client/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd client && bun install --frozen-lockfile && cd ..
          cd worker && bun install --frozen-lockfile && cd ..

      - name: Audit dependencies for known vulnerabilities
        working-directory: client
        run: bun pm ls --all 2>/dev/null | head -50
        continue-on-error: true

      - name: Check for suspicious install scripts in dependencies
        working-directory: client
        run: |
          echo "Checking for preinstall/postinstall scripts in dependencies..."
          SUSPICIOUS=$(find node_modules -maxdepth 3 -name "package.json" -exec grep -l '"preinstall"\|"postinstall"' {} \; 2>/dev/null || true)
          if [ -n "$SUSPICIOUS" ]; then
            echo "::warning::Found packages with install scripts:"
            echo "$SUSPICIOUS"
          else
            echo "✓ No suspicious install scripts found"
          fi

      - name: Type check (worker)
        working-directory: worker
        run: bun run typecheck

      - name: Type check (client — non-blocking)
        working-directory: client
        run: bun run typecheck || echo "::warning::Client type check has known issues (see tech debt)"
        continue-on-error: true

      - name: Run tests
        run: npx vitest run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd client && bun install --frozen-lockfile && cd ..
          cd worker && bun install --frozen-lockfile && cd ..

      - name: Build client
        working-directory: client
        run: bun run build.ts

      - name: Build worker
        working-directory: worker
        run: bun run build

      - name: Deploy to Cloudflare Workers
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
