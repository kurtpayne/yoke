name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Install worker dependencies
        working-directory: worker
        run: bun install

      - name: Type check (worker)
        working-directory: worker
        run: bun run typecheck

      - name: Type check (client — non-blocking)
        working-directory: client
        run: bun run typecheck || echo "::warning::Client type check has known issues (see tech debt)"
        continue-on-error: true

      - name: Run tests
        run: bun run test
