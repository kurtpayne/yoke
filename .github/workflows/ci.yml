name: CI + Deploy (Worker)

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - 'client/**'
      - 'tests/**'
      - 'prompts/**'
      - '*.lock'
      - 'package.json'
      - 'vitest.config.ts'
      - '.github/workflows/ci.yml'
      - 'biome.json'
  pull_request:
    branches: [main]
    paths:
      - 'worker/**'
      - 'client/**'
      - 'tests/**'
      - 'prompts/**'
      - '*.lock'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd client && bun install --frozen-lockfile && cd ..
          cd worker && bun install --frozen-lockfile && cd ..

      - name: Audit dependencies for known vulnerabilities
        working-directory: client
        run: bun pm ls --all 2>/dev/null | head -50
        continue-on-error: true

      - name: Check for suspicious install scripts in dependencies
        working-directory: client
        run: |
          echo "Checking for preinstall/postinstall scripts in dependencies..."
          SUSPICIOUS=$(find node_modules -maxdepth 3 -name "package.json" -exec grep -l '"preinstall"\|"postinstall"' {} \; 2>/dev/null || true)
          if [ -n "$SUSPICIOUS" ]; then
            echo "::warning::Found packages with install scripts:"
            echo "$SUSPICIOUS"
          else
            echo "✓ No suspicious install scripts found"
          fi

      - name: Type check (worker)
        working-directory: worker
        run: bun run typecheck

      - name: Type check (client)
        working-directory: client
        run: bun run typecheck

      - name: Run tests
        run: npx vitest run

      - name: Build client
        working-directory: client
        run: bun run build.ts

      - name: Build worker
        working-directory: worker
        run: bun run build

      - name: Check worker bundle size
        run: |
          SIZE=$(wc -c < worker/dist/worker.js)
          SIZE_KB=$((SIZE / 1024))
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Worker bundle: ${SIZE_KB} KB (${SIZE} bytes)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::Worker bundle exceeds 10 MB CF limit (${SIZE_MB} MB)"
            exit 1
          elif [ "$SIZE" -gt 5242880 ]; then
            echo "::warning::Worker bundle exceeds 5 MB (${SIZE_MB} MB) — approaching CF limit"
          else
            echo "✓ Bundle size OK"
          fi

      - name: Lint (Biome)
        run: npx @biomejs/biome check .

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd client && bun install --frozen-lockfile && cd ..
          cd worker && bun install --frozen-lockfile && cd ..

      - name: Build client
        working-directory: client
        run: bun run build.ts

      - name: Build worker
        working-directory: worker
        run: bun run build

      - name: Generate wrangler.toml
        working-directory: worker
        env:
          D1_STATS_DB_ID: ${{ secrets.D1_STATS_DB_ID }}
          KV_REFERENCE_DATA_ID: ${{ secrets.KV_REFERENCE_DATA_ID }}
        run: |
          cat > wrangler.toml << EOF
          name = "yoke"
          main = "dist/worker.js"
          compatibility_date = "2024-12-01"

          [vars]
          BASE_URL = "https://yoke.lol"

          [assets]
          directory = "../client/dist"
          binding = "ASSETS"

          [[d1_databases]]
          binding = "STATS_DB"
          database_name = "yoke-stats"
          database_id = "${D1_STATS_DB_ID}"

          [[kv_namespaces]]
          binding = "REFERENCE_DATA"
          id = "${KV_REFERENCE_DATA_ID}"

          [[routes]]
          pattern = "yoke.lol/*"
          zone_name = "yoke.lol"

          [[services]]
          binding = "OG_WORKER"
          service = "yoke-og"
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' wrangler.toml

      - name: Deploy to Cloudflare Workers
        working-directory: worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install worker dependencies (for wrangler rollback)
        run: |
          cd worker && bun install --frozen-lockfile && cd ..

      - name: Wait for edge propagation
        run: sleep 15

      - name: Smoke test — HTML homepage
        run: |
          echo "Checking https://yoke.lol/ returns HTML..."
          curl -sf --max-time 30 https://yoke.lol/ | grep -q '<title>'
          echo "✓ Homepage OK"

      - name: Smoke test — API docs
        run: |
          echo "Checking https://yoke.lol/api/docs..."
          curl -sf --max-time 30 https://yoke.lol/api/docs | grep -qi 'api'
          echo "✓ API docs OK"

      - name: Smoke test — JSON API
        run: |
          echo "Checking JSON API with example.com..."
          curl -sf --max-time 90 -H "Accept: application/json" "https://yoke.lol/example.com" | jq -e '.domain' > /dev/null
          echo "✓ JSON API OK"

      - name: Smoke test — Status page
        run: |
          echo "Checking https://yoke.lol/status..."
          curl -sf --max-time 30 https://yoke.lol/status | grep -qi 'status'
          echo "✓ Status page OK"

      # ── Rollback on failure ──────────────────────────────────────
      - name: Generate wrangler.toml (for rollback)
        if: failure()
        working-directory: worker
        env:
          D1_STATS_DB_ID: ${{ secrets.D1_STATS_DB_ID }}
          KV_REFERENCE_DATA_ID: ${{ secrets.KV_REFERENCE_DATA_ID }}
        run: |
          cat > wrangler.toml << EOF
          name = "yoke"
          main = "dist/worker.js"
          compatibility_date = "2024-12-01"

          [vars]
          BASE_URL = "https://yoke.lol"

          [assets]
          directory = "../client/dist"
          binding = "ASSETS"

          [[d1_databases]]
          binding = "STATS_DB"
          database_name = "yoke-stats"
          database_id = "${D1_STATS_DB_ID}"

          [[kv_namespaces]]
          binding = "REFERENCE_DATA"
          id = "${KV_REFERENCE_DATA_ID}"

          [[routes]]
          pattern = "yoke.lol/*"
          zone_name = "yoke.lol"

          [[services]]
          binding = "OG_WORKER"
          service = "yoke-og"
          EOF
          sed -i 's/^          //' wrangler.toml

      - name: 🚨 Rollback deployment
        if: failure()
        working-directory: worker
        run: |
          echo "::error::Smoke tests failed — rolling back to previous deployment"
          echo "y" | npx wrangler rollback --message "Automatic rollback: smoke tests failed"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
