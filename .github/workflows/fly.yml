name: Deploy Fly Proxy

on:
  push:
    branches: [main]
    paths:
      - 'fly-proxy/**'
      - '.github/workflows/fly.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go tests
        working-directory: fly-proxy
        run: go test -v ./...

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy (blue-green)
        working-directory: fly-proxy
        run: flyctl deploy --remote-only --strategy bluegreen
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Wait for traffic routing
        run: sleep 15

      - name: Smoke test — Health endpoint
        run: |
          echo "Checking /health..."
          curl -sf --max-time 10 https://yoke-probe.fly.dev/health | jq -e '.status == "ok"'
          echo "✓ Health OK"

      # Exercise real proxy paths against big domains (3/5 must pass)
      - name: Smoke test — Real domain probes
        run: |
          DOMAINS=("google.com" "apple.com" "amazon.com" "microsoft.com" "cloudflare.com")
          PASS=0
          FAIL=0
          AUTH_SECRET="${{ secrets.FLY_AUTH_SECRET }}"

          for domain in "${DOMAINS[@]}"; do
            echo -n "  probe-status $domain... "
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              -H "Authorization: Bearer ${AUTH_SECRET}" \
              "https://yoke-probe.fly.dev/probe-status?domain=${domain}")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              echo "✓ ($STATUS)"
              PASS=$((PASS + 1))
            else
              echo "✗ ($STATUS)"
              FAIL=$((FAIL + 1))
            fi
          done

          echo ""
          echo "Results: ${PASS}/5 passed, ${FAIL}/5 failed"

          if [ "$PASS" -lt 3 ]; then
            echo "::error::Only ${PASS}/5 domain probes passed — proxy may be broken"
            exit 1
          else
            echo "✓ Smoke tests passed (${PASS}/5 — threshold is 3/5)"
          fi

      - name: 🚨 Alert on failure
        if: failure()
        run: |
          echo "::error::Fly proxy smoke tests failed after blue-green deploy!"
          echo "::error::Fly health checks should have caught this — check deploy logs"
          echo "::error::Dashboard: https://fly.io/apps/yoke-probe"
          exit 1
