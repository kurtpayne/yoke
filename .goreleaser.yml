version: 2

project_name: yoke

before:
  hooks:
    - bash -c "cd cli && go mod tidy"

builds:
  - id: yoke
    dir: cli
    main: .
    binary: yoke
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "yoke_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github-native

release:
  github:
    owner: yokedotlol
    name: yoke
  draft: false
  prerelease: auto

brews:
  - name: yoke
    repository:
      owner: yokedotlol
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://yoke.lol
    description: "Domain intelligence in one pass — DNS, WHOIS, SSL, security, tech stack, performance, breaches, and AI analysis"
    license: MIT
    install: |
      bin.install "yoke"
    test: |
      assert_match version.to_s, shell_output("#{bin}/yoke --version")
