<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; }
    iframe { width: 100%; height: 100%; border: none; }

    /* Settings toggle button */
    #settings-btn {
      position: fixed; top: 8px; right: 8px; z-index: 1000;
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(15, 20, 35, 0.85); border: 1px solid rgba(0, 255, 255, 0.15);
      color: rgba(0, 255, 255, 0.6); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.2s;
      backdrop-filter: blur(8px);
    }
    #settings-btn:hover {
      background: rgba(15, 20, 35, 0.95); color: rgba(0, 255, 255, 0.9);
      border-color: rgba(0, 255, 255, 0.4);
    }
    #settings-btn.active { color: #0ff; border-color: rgba(0, 255, 255, 0.5); }

    /* Settings panel overlay */
    #settings-panel {
      display: none; position: fixed; top: 40px; right: 8px; z-index: 999;
      width: 260px; background: #0d1220; border: 1px solid rgba(0, 255, 255, 0.12);
      border-radius: 10px; padding: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(12px);
    }
    #settings-panel.open { display: block; }

    .settings-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px; font-weight: 600; color: rgba(0, 255, 255, 0.5);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;
    }

    .icon-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .icon-option {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 4px; border-radius: 8px; cursor: pointer;
      border: 2px solid transparent; background: rgba(255,255,255,0.03);
      transition: all 0.15s;
    }
    .icon-option:hover {
      background: rgba(0, 255, 255, 0.06); border-color: rgba(0, 255, 255, 0.15);
    }
    .icon-option.selected {
      background: rgba(0, 255, 255, 0.08); border-color: rgba(0, 255, 255, 0.4);
    }
    .icon-option img {
      width: 36px; height: 36px; border-radius: 6px;
      image-rendering: -webkit-optimize-contrast;
    }
    .icon-option span {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 10px; color: rgba(255,255,255,0.5); text-transform: capitalize;
    }
    .icon-option.selected span { color: #0ff; }
  </style>
</head>
<body>
  <button id="settings-btn" title="Extension settings">⚙</button>
  <div id="settings-panel">
    <div class="settings-label">Toolbar Icon</div>
    <div class="icon-grid" id="icon-grid"></div>
  </div>
  <iframe id="yoke-frame" src="about:blank"></iframe>
  <script src="sidepanel.js"></script>
</body>
</html>
